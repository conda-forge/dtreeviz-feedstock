{% set name = "dtreeviz" %}
{% set version = "2.2.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dtreeviz-{{ version }}.tar.gz
  sha256: a145ff91ffaa11bd2f59186fdcffaa384d90c1757517cbb27e66cc83922319ba

build:
  number: 1
  noarch: python
  script: python -m pip install . -vv


outputs:
  - name: {{ name }}
    requirements:
      host:
        - pip
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - colour
        - python-graphviz >=0.9
        - matplotlib-base
        - numpy
        - pandas
        - pillow
        - pytest
        - scikit-learn

    test:
      imports:
        - dtreeviz
      commands:
        - pip check
      requires:
        - pip
  - name: {{ name }}-extended
    requirements:
      host:
        - pip
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage(name, exact=True) }}
        - pyspark
        - py-xgboost
        - lightgbm

    test:
      imports:
        - dtreeviz
        - dtreeviz.models
      commands:
        - pip check
      requires:
        - pip
        - python {{ python_min }}

about:
  home: https://github.com/parrt/dtreeviz
  summary: A python library for decision tree visualization and model interpretation
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - raybellwaves
    - pplonski
